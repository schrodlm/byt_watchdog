# Byt Watchdog - Multi-profile configuration
# Each profile is an independent search with its own scrapers, filters, and recipients.

email:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  smtp_user: "your-email@gmail.com"
  smtp_password: "your-app-password"
  from: "your-email@gmail.com"

schedule:
  cron_interval_hours: 3

profiles:
  # Profile 1: Praha 7 flat rentals
  praha7-byty:
    name: "Praha 7 - byty k pronajmu"
    enabled: true
    to:
      - "you@gmail.com"
      - "partner@gmail.com"

    search:
      offer_type: rent          # rent | sale
      estate_type: flat         # flat | house | land | cottage
      min_price: 0
      max_price: 25000
      dispositions: []          # e.g. ["2+kk", "2+1"] - empty means all
      min_size_m2: 0

    scrapers:
      sreality:
        enabled: true
        category_main_cb: 1       # 1=byty
        category_type_cb: 2       # 2=pronajem
        locality_district_id: 5007  # Praha 7
      bezrealitky:
        enabled: true
        estate_type: "BYT"
        offer_type: "PRONAJEM"
        region_osm_id: "R20000064250"  # Praha 7
        osm_value: "Praha 7, obvod Praha 7, Hlavni mesto Praha, Praha, Cesko"
      remax:
        enabled: true
        search_url: "https://www.remax-czech.cz/reality/vyhledavani/?hledani=2&price_from={min_price}&price_to={max_price}&regions%5B19%5D%5B78%5D=on&types%5B4%5D=on"

    scoring:
      price_per_m2_weight: 40
      disposition_weight: 30
      preferred_dispositions:
        - "2+kk"
        - "2+1"
        - "3+kk"
        - "1+1"
      size_weight: 15
      ideal_size_m2: 55
      neighborhood_weight: 15
      preferred_neighborhoods:
        - "Holesovice"
        - "Letna"
        - "Bubenec"

    tram_enrichment: true       # Only for Prague profiles

  # Profile 2: Domazlice houses/cottages for sale
  domazlice-domy:
    name: "Domazlicko - domy a chalupy"
    enabled: true
    to:
      - "father@gmail.com"

    search:
      offer_type: sale
      estate_type: house        # house | cottage | land
      min_price: 0
      max_price: 5000000
      dispositions: []
      min_size_m2: 0
      min_land_m2: 500          # Minimum land/plot area

    scrapers:
      sreality:
        enabled: true
        category_main_cb: 2       # 2=domy
        category_type_cb: 1       # 1=prodej
        locality_district_id: 8   # Domazlicky okres
        category_sub_cb: "37|43|44"  # rodinne domy + chalupy + zemedelske usedlosti
      bezrealitky:
        enabled: true
        estate_type: "DUM"
        offer_type: "PRODEJ"
        region_osm_id: "R441864"   # Okres Domazlice
        osm_value: "Domazlice"
      remax:
        enabled: true
        search_url: "https://www.remax-czech.cz/reality/vyhledavani/?hledani=1&price_from={min_price}&price_to={max_price}&types%5B6%5D=on&types%5B10%5D=on&regions%5B43%5D%5B3402%5D=on"

    scoring:
      price_per_m2_weight: 0      # Not relevant for houses
      disposition_weight: 0
      preferred_dispositions: []
      size_weight: 30
      ideal_size_m2: 150
      neighborhood_weight: 0
      preferred_neighborhoods: []
      land_weight: 40             # Bigger land = better
      ideal_land_m2: 2000
      price_weight: 30            # Lower total price = better
      max_good_price: 3000000     # Price considered "good"
